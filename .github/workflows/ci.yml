name: BaseLib CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{ matrix.configuration }}

    - name: Build
      run: |
        cmake --build ${{ github.workspace }}/build --config ${{ matrix.configuration }} --parallel

    - name: Run Tests
      run: |
        ${{ github.workspace }}/build/${{ matrix.configuration }}/test_all.exe
        ${{ github.workspace }}/build/${{ matrix.configuration }}/test_random.exe

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BaseLib-windows-${{ matrix.configuration }}
        path: |
          ${{ github.workspace }}/build/${{ matrix.configuration }}/*.lib
          ${{ github.workspace }}/build/${{ matrix.configuration }}/*.exe

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install GCC
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake build-essential

    - name: Configure CMake
      run: |
        cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ matrix.configuration }}

    - name: Build
      run: |
        cmake --build ${{ github.workspace }}/build --parallel

    - name: Run Tests
      run: |
        ${{ github.workspace }}/build/test_all
        ${{ github.workspace }}/build/test_random

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BaseLib-linux-${{ matrix.configuration }}
        path: |
          ${{ github.workspace }}/build/*.a
          ${{ github.workspace }}/build/test_all
          ${{ github.workspace }}/build/test_random

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ matrix.configuration }}

    - name: Build
      run: |
        cmake --build ${{ github.workspace }}/build --parallel

    - name: Run Tests
      run: |
        ${{ github.workspace }}/build/test_all
        ${{ github.workspace }}/build/test_random

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BaseLib-macos-${{ matrix.configuration }}
        path: |
          ${{ github.workspace }}/build/*.a
          ${{ github.workspace }}/build/test_all
          ${{ github.workspace }}/build/test_random
